services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    user: "${UID:-1000}:${GID:-1000}"
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - ./storage:/app/storage
    restart: unless-stopped

  api-tests:
    build:
      context: .
      dockerfile: Dockerfile
      target: test
    env_file:
      - .env
    profiles:
      - test
